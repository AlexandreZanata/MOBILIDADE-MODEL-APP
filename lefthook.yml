# Lefthook configuration for the mobile app repository.
# Validates architecture and quality gates before commit.
output:
  - failure

pre-commit:
  parallel: false
  commands:
    validate-app-structure:
      run: bash scripts/validate-app-structure.sh
    lint:
      run: bash scripts/validate-lint.sh
    typecheck:
      run: npm run typecheck
    test:
      run: npm run test

commit-msg:
  commands:
    conventional-commit:
      run: bash scripts/validate-commit-msg.sh {1}
